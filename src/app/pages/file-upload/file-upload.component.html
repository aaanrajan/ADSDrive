<!-- file-drop.component.html -->
<div
  class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center cursor-pointer transition hover:bg-gray-50"
  (drop)="onDrop($event)"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  [class.bg-blue-50]="isDragging"
  (click)="fileInput.click()"
>
  <sl-icon name="folder" class="text-blue-500 text-4xl mb-2"></sl-icon>
  <p class="text-gray-700 font-medium">Drag & drop files or folders here</p>
  <p class="text-sm text-gray-500">Or click to select files</p>
  <input
    type="file"
    #fileInput
    class="hidden"
    (change)="onFileSelected($event)"
    webkitdirectory
    multiple
  />
</div>

<!-- File list (optional) -->
<ul class="mt-4 text-left text-sm text-gray-700" *ngIf="selectedFiles.length > 0">
  <li *ngFor="let file of selectedFiles">{{ file.webkitRelativePath || file.name }}</li>
</ul>
