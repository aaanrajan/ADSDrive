<div #container class="flex flex-col h-[85vh] overflow-y-auto relative">

  <app-page-header
    title="Shared Files"
    subtitle="Display all the files uploaded into cloud"
    [breadcrums]="breadcrums"
    (breadcrumbClicked)="onFolderClick($event)">
  </app-page-header>

  <!-- Tabs (only when online) -->
  <div class="w-full max-w-md text-black-400" *ngIf="online">
    <div class="flex gap-4">
      <button
        *ngFor="let tab of tabs; let i = index"
        (click)="selectTab(i)"
        [class.border-b-2]="selectedTab === i"
        [class.border-orange-400]="selectedTab === i"
        [class.text-orange-500]="selectedTab === i"
        class="py-1 font-[300] focus:outline-none cursor-pointer">
        {{ tab.label }}
      </button>
    </div>
  </div>

  <!-- Dialog-style No Internet Message -->
<div *ngIf="!online" class="absolute inset-0 flex items-center justify-center bg-gradient-to-b from-orange-50 to-orange-100">
  <div class="bg-white rounded-3xl shadow-2xl p-10 flex flex-col items-center justify-center text-center max-w-md w-full mx-4 relative overflow-hidden">

    <!-- Decorative shapes -->
    <div class="absolute -top-12 -right-12 w-40 h-40 bg-orange-200 rounded-full opacity-50 blur-xl"></div>
    <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-orange-300 rounded-full opacity-40 blur-md"></div>

    <!-- Illustration -->
    <div class="relative mb-8 animate-pulse">
      <div class="w-32 h-32 bg-orange-100 rounded-full flex items-center justify-center shadow-inner">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <!-- Wi-Fi symbol -->
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 20h.01M2.5 8.5a15.88 15.88 0 0119 0M6.5 12.5a9.92 9.92 0 0111 0M9.5 16.5a5.94 5.94 0 016 0" />
          <!-- Cross line -->
          <line x1="4" y1="4" x2="20" y2="20" stroke="currentColor" stroke-width="2" />
        </svg>
      </div>
    </div>

    <!-- Text -->
    <h2 class="text-3xl font-bold text-orange-600 mb-2">No Internet Connection</h2>
    <p class="text-gray-600 mb-6 px-4">
      You’re currently offline. Please check your Wi-Fi or mobile data connection and try again.
    </p>
  </div>
</div>

  <!-- File view section -->
  <div class="relative flex-1 overflow-y-auto bg-white" *ngIf="online">
    <app-file-view
      [headerHeightPx]="262"
      [page]="action"
      [loading]="isLoading"
      [nodes]="filteredFolders"
      [parentFolder]="getCurrentFolder()"
      [parentId]="getCurrentFolderId()"
      (folderCreated)="createFolder($event)"
      (folderClicked)="onFolderClick($event)"
      (folderRenamed)="onFolderRenamed($event)"
      [access]="access"
       (refreshFolder)="refreshFileList($event)"
      >
    </app-file-view>
  </div>

</div>
