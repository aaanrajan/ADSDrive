<div class="flex flex-col h-[85vh] overflow-y-auto">
  <div class="flex flex-col">
    <p class="text-sm text-gray-800 semi-bold">Recent Files</p>
  </div>

  <div class="relative flex-1 overflow-y-auto bg-white h-full">
    <app-file-view [nodes]="recentFiles" [page]="'RECENT'" [loading]="isLoading"
      (scrolled)="onFileViewScrolled($event)">

    </app-file-view>

    <div *ngIf="recentFiles.length === 0 && !isLoading"
      class="absolute inset-0 flex items-center justify-center text-gray-500 text-sm italic pointer-events-none">
      📁 No recent files found
    </div>
  </div>
