<div *ngIf="isSwitching" class="switch-overlay">

  <div class="switch-card">

    <!-- Avatar -->
    <div class="avatar">
      {{ selectedSession?.fullName?.charAt(0) || selectedSession?.username?.charAt(0) || 'U' }}
    </div>

    <!-- Main Text -->
    <div class="title">
      Switching account
    </div>

    <!-- Step -->
    <div class="step">
      {{ loadingStep }}
    </div>

    <!-- Progress -->
    <div class="progress-container" *ngIf="status === 'loading'">
      <div class="progress-bar"></div>
    </div>

    <!-- Success -->
    <div *ngIf="status === 'success'" class="status success">
      ✔ Done
    </div>

    <!-- Error -->
    <div *ngIf="status === 'error'" class="status error">
      {{ responseMessage || 'Something went wrong' }}
    </div>

  </div>

</div>
