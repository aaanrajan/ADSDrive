<div class="fixed inset-0 flex items-center justify-center bg-opacity-30 z-9999"
   style="background-color: rgb(143 134 134 / 36%);">
    <div class="bg-white rounded-xl p-6 w-[400px] max-w-[90%] shadow-2xl">
    
      <h3 class="text-lg font-semibold mb-3">
        {{title}}
      </h3>
    
      <p class="text-gray-600 mb-6">
       {{message}}
      </p>
    
      <div class="flex justify-end gap-3">
    
        <button class="px-4 py-2 rounded-lg border border-gray-300 cursor-pointer" (click)="closeModel(false)">
          {{revertBtnText}}
        </button>
    
        <button class="px-4 py-2 rounded-lg bg-red-500 text-white cursor-pointer" (click)="closeModel(true)">
          {{actionBtn}}
        </button>
    
      </div>
    </div>
</div>
