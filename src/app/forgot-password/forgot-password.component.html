<!-- Forgot Password Component with Responsive Layout -->
<div class="flex flex-col md:flex-row min-h-screen">
  <!-- Left Side Content -->

<div class="hidden md:flex md:w-1/2 m-4 rounded-lg items-center justify-center bg-orange-100">
  <div class="text-center px-8">
    <h1 class="text-4xl font-bold text-black-600 mb-4">Forgot Your Password?</h1>
    <p class="text-gray-700 text-lg">
      Don’t worry — we’ll help you reset it. Please set a new password to secure your account and continue.
    </p>
  </div>
</div>


  <!-- Right Side Forgot Password Form -->
    <div class="w-full flex-1 flex items-center justify-center p-6 bg-white">

        <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">
      <h2 class="text-2xl font-semibold mb-6 text-center">Forgot Password</h2>
      <form class="flex flex-col gap-6" [formGroup]="forgotPasswordForm">
        <sl-input label="Email" type="email" class="orange-input" [value]="forgotPasswordForm.get('email')?.value"
          (sl-input)="onInputChange($event, 'email')" placeholder="you@example.com" required></sl-input>

        <div *ngIf="forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched" class="text-red-500 text-sm">
          <span *ngIf="forgotPasswordForm.get('email')?.errors?.['required']">Email is required.</span>
          <span *ngIf="!forgotPasswordForm.get('email')?.errors?.['required'] && forgotPasswordForm.get('email')?.errors?.['email']">
            Invalid email format.
          </span>
        </div>

        <sl-button type="primary" class="w-full orange-btn mb-4" (click)="sendResetLink()" [disabled]="!forgotPasswordForm.valid">
          Send Reset Link
        </sl-button>
      </form>
      <p class="mt-4 text-base text-center text-black">
        Remember your password?
        <a routerLink="/login" class="text-orange-400 font-[700] hover:underline">Go back to Login</a>
      </p>
    </div>
  </div>
</div>
