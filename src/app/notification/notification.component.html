<!-- Full-Screen Mobile Notification Overlay -->
<div class="fixed inset-0 z-50 bg-white md:relative md:inset-auto md:z-auto md:bg-transparent">
  
  <!-- Header -->
  <div class="flex items-center justify-between px-4 py-3 bg-white border-b border-gray-200">
    <!-- Left: Back Arrow (Mobile Only) + Title -->
    <div class="flex items-center gap-3">
      <!-- Back Arrow - Hidden on tablet/desktop -->
      <button (click)="closeNotifications()" type="button" class="md:hidden text-gray-700 hover:text-gray-900 -ml-4 px-2 cursor-pointer">
        <i class="fas fa-arrow-left text-xl"></i>
      </button>
      
      <div class="flex items-center gap-2">
        <h5 class="text-sm  font-semibold text-gray-900">Notifications</h5>     
        <span class="bg-orange-500 text-white text-[8px] rounded-full w-7 h-7 flex items-center justify-center font-semibold">
          {{ notifications.length }}
        </span>
      </div>
    </div>

    <!-- Right: Mark all as read -->
    <!-- <button (click)="markAllAsRead()" 
      class="text-orange-500 text-sm font-semibold whitespace-nowrap cursor-pointer">
      Mark all as read
       <i class="fas fa-ellipsis-vertical text-lg cursor-pointer"></i>
    </button> -->
  </div>

  <!-- Tabs -->
  <div class="flex border-b border-gray-200 bg-white px-4">
    <!-- All -->
    <button (click)="switchTab('all')" 
      [ngClass]="{
        'border-b-2 border-orange-500 text-orange-500 font-semibold': notificationTab === 'all',
        'text-gray-600': notificationTab !== 'all'
      }" 
      class="px-4 py-3 text-sm transition-all duration-200 -mb-px cursor-pointer">
      All
    </button>

    <!-- Unread -->
    <button (click)="switchTab('unread')" 
      [ngClass]="{
        'border-b-2 border-orange-500 text-orange-500 font-semibold': notificationTab === 'unread',
        'text-gray-600': notificationTab !== 'unread'
      }" 
      class="px-4 py-3 text-sm transition-all duration-200 -mb-px cursor-pointer">
      Unread
    </button>
  </div>

  <!-- Notifications List -->
  <div class="overflow-y-auto overflow-x-hidden h-[calc(100vh-130px)] md:h-auto md:max-h-[340px] md:min-h-[340px] scrollbar-hide">


      <!-- 🔹 SKELETON LOADER -->
  <div *ngIf="isLoading" class="px-4 py-3 space-y-4 fadeSoft 1.5s ease-in-out infinite">
    <div *ngFor="let i of [1,2,3,4,5]" class="flex gap-3">
      <div class="w-10 h-10 rounded-full bg-gray-300"></div>
      <div class="flex-1 space-y-2">
        <div class="h-3 bg-gray-300 rounded w-1/3"></div>
        <div class="h-3 bg-gray-200 rounded w-full"></div>
        <div class="h-3 bg-gray-200 rounded w-2/3"></div>
      </div>
    </div>
  </div>

    <!-- EMPTY MESSAGE -->
    <div *ngIf="notifications.length === 0 && !isLoading" 
      class="flex items-center justify-center text-gray-500 text-sm py-10">
      No notifications found
    </div>

    <!-- NOTIFICATION LIST -->
    <div *ngFor="let n of notifications"
      class="flex items-start gap-3 px-4 py-3 relative border-b border-gray-200 transition-colors overflow-hidden"
      [ngClass]="!n.markAsViewed ? 'bg-orange-50' : 'bg-white'">

      <!-- Avatar -->
      <div class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-300 flex-shrink-0 mt-1">
        <i class="fas fa-user text-gray-600 text-base"></i>
      </div>

      <!-- Content -->
      <div class="flex-1 min-w-0 pr-8 overflow-hidden">
        <div class="font-semibold text-gray-900 text-sm leading-tight truncate">
          {{ n.userName || 'You' }}
        </div>

        <div class="text-sm text-gray-600 mt-1 leading-snug break-words">
          {{ n.message }}
        </div>

        <!-- Optional: Show time if available -->
        <div *ngIf="n.timeAgo" class="mt-1 text-xs text-gray-500 truncate">
          {{ n.timeAgo }}
        </div>
      </div>

      <!-- Right side 3-dot icon -->
     
      <div class="absolute right-4 top-4">
      
        <!-- <button (click)="toggleMenu(n, $event)" class="text-gray-400 hover:text-gray-600 p-1">
          <i class="fas fa-ellipsis-vertical text-lg cursor-pointer"></i>
        </button> -->
      
        <!-- POPUP MENU (DESKTOP + MOBILE SAME) -->
        <div *ngIf="n.showMenu" class="fixed z-[9999] bg-white rounded-lg shadow-lg
               border border-[#e5e7eb] w-44" [style.top.px]="menuPosition.top" [style.left.px]="menuPosition.left"
          (click)="$event.stopPropagation()">
      
          <button (click)="toggleRead(n)" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-100">
            {{ n.markAsViewed ? 'Mark as Unread' : 'Mark as Read' }}
          </button>
      
          <button class="w-full text-left px-4 py-2 text-sm hover:bg-gray-100">
            Go to Details
          </button>
      
          <button (click)="deleteNotification(n)"  class="w-full text-left px-4 py-2 text-sm  hover:bg-gray-100">
            Delete
          </button>
        </div>
    </div>
  </div>

</div>
